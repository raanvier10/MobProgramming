name: ngekosin
description: Ngekos.in - Aplikasi pencarian hunian untuk calon penghuni.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  flutter_secure_storage: ^8.0.0
  cached_network_image: ^3.2.3
  google_fonts: ^4.0.4
  intl: ^0.20.2
  device_preview_plus: ^2.8.2
  flutter_map: ^4.0.0
  latlong2: ^0.8.1
  provider: ^6.1.5+1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  bloc_test: ^9.1.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  # 1. DAFTARKAN FOLDER GAMBAR KAMU DI SINI (WAJIB!)
  assets:
    - assets/images/

  # Definisikan font global di sini
  fonts:
    - family: PlusJakartaSans
      fonts:
        # Regular & Italic (Weight 400)
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Italic.ttf
          style: italic

        # Extra Light (Weight 200)
        - asset: assets/fonts/PlusJakartaSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/PlusJakartaSans-ExtraLightItalic.ttf
          weight: 200
          style: italic

        # Light (Weight 300)
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-LightItalic.ttf
          weight: 300
          style: italic

        # Medium (Weight 500)
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-MediumItalic.ttf
          weight: 500
          style: italic

        # Semi Bold (Weight 600)
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-SemiBoldItalic.ttf
          weight: 600
          style: italic

        # Bold (Weight 700)
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-BoldItalic.ttf
          weight: 700
          style: italic

        # Extra Bold (Weight 800)
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/PlusJakartaSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic